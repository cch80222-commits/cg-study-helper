<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f766e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="海巡研究班助手" />
<title>海巡研究班助手 v1.1.1</title>
<style>
:root{--main:#0f766e;--main2:#2563eb;--bg1:#e0f2fe;--bg2:#ecfeff;--card:#ffffff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--danger:#ef4444;--warn:#f59e0b;--soft:#f8fafc}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;color:var(--text);background:linear-gradient(145deg,var(--bg1),var(--bg2))}.app{max-width:560px;margin:0 auto;padding:18px 16px 34px}.header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}.header h1{margin:0;font-size:25px;font-weight:950;letter-spacing:.5px}.header p{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:700}.version{padding:8px 11px;border-radius:999px;color:#0f766e;background:rgba(255,255,255,.75);font-size:12px;font-weight:900;box-shadow:0 6px 16px rgba(15,23,42,.06);white-space:nowrap}.date-card{background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.85);border-radius:26px;padding:18px;margin-bottom:14px;box-shadow:0 10px 26px rgba(15,23,42,.08)}.date-label{color:var(--muted);font-size:14px;font-weight:900;margin-bottom:8px}.date-main{font-size:34px;font-weight:950;color:#0f766e;line-height:1.1}.date-sub{margin-top:8px;font-size:18px;font-weight:900;color:#334155}.course-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.mini{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:13px}.mini .k{color:var(--muted);font-size:13px;font-weight:900}.mini .v{margin-top:6px;color:#0f766e;font-size:22px;font-weight:950}.hero{position:relative;overflow:hidden;color:white;background:linear-gradient(135deg,#0f766e,#2563eb);border-radius:28px;padding:20px 18px;margin-bottom:14px;box-shadow:0 18px 38px rgba(15,118,110,.24)}.hero:before{content:"";position:absolute;width:150px;height:150px;border-radius:999px;right:-48px;top:-48px;background:rgba(255,255,255,.12)}.hero h2{margin:0 0 14px;font-size:18px;font-weight:950}.count-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}.count-box{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);border-radius:18px;padding:14px 7px;text-align:center;backdrop-filter:blur(8px)}.count-num{font-size:29px;font-weight:950;line-height:1}.count-label{margin-top:6px;font-size:12px;font-weight:850;opacity:.92}.live{margin-top:12px;padding:12px;border-radius:16px;background:rgba(255,255,255,.17);text-align:center;font-weight:900;line-height:1.5}.progress-row{display:flex;justify-content:space-between;margin-top:14px;font-size:13px;font-weight:900}.bar{height:12px;margin-top:7px;border-radius:999px;background:rgba(255,255,255,.30);overflow:hidden}.bar span{display:block;height:100%;width:0%;border-radius:999px;background:white;transition:.35s}.card{background:rgba(255,255,255,.90);border:1px solid rgba(255,255,255,.85);border-radius:24px;padding:17px;margin:14px 0;box-shadow:0 10px 26px rgba(15,23,42,.08)}.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.section-title h2{margin:0;font-size:19px;font-weight:950}label{display:block;margin:12px 0 6px;color:#334155;font-size:14px;font-weight:900}input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:15px;padding:13px;background:white;font-size:16px;font-family:inherit}textarea{min-height:90px;resize:vertical}button{border:none;border-radius:15px;padding:12px 14px;font-family:inherit;font-size:15px;font-weight:950;cursor:pointer}button:active{transform:scale(.985)}.primary{width:100%;margin-top:12px;background:var(--main);color:white}.next{background:#fffbeb;border:1px solid #fde68a;border-left:6px solid var(--warn);border-radius:18px;padding:14px}.next .date{color:#92400e;font-size:13px;font-weight:950}.next .name{margin:6px 0;font-size:20px;font-weight:950;word-break:break-word}.next .left{color:#0f766e;font-size:15px;font-weight:950}details{margin-top:12px}summary{list-style:none;padding:13px;border-radius:16px;background:#f1f5f9;color:#334155;font-weight:950;cursor:pointer}summary::-webkit-details-marker{display:none}.event,.note,.todo{margin-top:10px;padding:13px;border:1px solid var(--line);border-radius:17px;background:#f8fafc}.event{border-left:5px solid var(--main2)}.event-name,.note-title,.todo-title{font-size:16px;font-weight:950;word-break:break-word}.meta{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.5}.count{margin-top:8px;color:#0f766e;font-size:14px;font-weight:950}.actions{display:flex;gap:8px;margin-top:10px}.danger{flex:1;padding:9px;border-radius:12px;background:#fee2e2;color:#b91c1c;font-size:14px}.empty{padding:16px 4px;text-align:center;color:#94a3b8;font-size:14px}.footer{padding:16px;text-align:center;color:#64748b;font-size:12px;line-height:1.6}@media(max-width:380px){.app{padding:12px 12px 30px}.header h1{font-size:22px}.date-main{font-size:29px}.course-info{grid-template-columns:1fr}.count-num{font-size:24px}}
</style>
</head>
<body>
<main class="app">
<header class="header"><div><h1>海巡研究班助手</h1><p>倒數、期程、待辦、筆記</p></div><div class="version">v1.1.1</div></header>
<section class="date-card"><div class="date-label">今天</div><div class="date-main" id="todayDate">----/--/--</div><div class="date-sub" id="todayWeek">星期-</div><div class="course-info"><div class="mini"><div class="k">訓期天數</div><div class="v" id="courseDay">第 -- 天</div></div><div class="mini"><div class="k">目前週次</div><div class="v" id="courseWeek">第 -- 週</div></div></div></section>
<section class="hero"><h2>距離結訓</h2><div class="count-grid"><div class="count-box"><div class="count-num" id="monthLeft">--</div><div class="count-label">月</div></div><div class="count-box"><div class="count-num" id="weekLeft">--</div><div class="count-label">週</div></div><div class="count-box"><div class="count-num" id="dayLeft">--</div><div class="count-label">天</div></div></div><div class="live" id="liveCount">計算中...</div><div class="progress-row"><span>訓期進度</span><span id="progressLabel">--.---%</span></div><div class="bar"><span id="progressBar"></span></div></section>
<section class="card"><div class="section-title"><h2>最近重要期程</h2></div><div id="nextEvent"></div><details><summary id="otherSummary">其他期程</summary><div id="otherEvents"></div></details><details><summary id="historySummary">歷史期程</summary><div id="historyEvents"></div></details></section>
<section class="card"><div class="section-title"><h2>新增重要期程</h2></div><label for="eventName">期程名稱</label><input id="eventName" placeholder="例如：期中考、期末考、專題報告日"><label for="eventDate">日期與時間</label><input id="eventDate" type="datetime-local"><button class="primary" onclick="addEvent()">新增期程</button></section>
<section class="card"><div class="section-title"><h2>待辦事項</h2></div><div id="todoList"></div></section>
<section class="card"><div class="section-title"><h2>上課筆記</h2></div><label for="courseName">課程名稱</label><input id="courseName" placeholder="例如：IMO、AI課程、海洋法"><label for="noteInput">筆記內容</label><textarea id="noteInput" placeholder="輸入今天上課重點..."></textarea><button class="primary" onclick="addNote()">新增筆記</button><div id="noteList"></div></section>
<div class="footer">開訓：2026/06/29｜結訓：2026/12/24 17:00<br>v1.1a：日期放大、月週天倒數、三位小數進度、期程收合、課程資料庫隱藏。</div>
</main>
<script>
const COURSE_START=new Date(2026,5,29,0,0,0);const COURSE_END=new Date(2026,11,24,17,0,0);const EVENT_KEY="cg_v1_events";const NOTE_KEY="cg_v1_notes";const TODO_KEY="cg_v1_todos";
let events=load(EVENT_KEY,[{id:101,name:"專題報告期程規劃",time:new Date(2026,6,10,9,0,0).getTime()},{id:102,name:"期中考（可自行修改）",time:new Date(2026,8,25,9,0,0).getTime()},{id:103,name:"期末考（可自行修改）",time:new Date(2026,11,10,9,0,0).getTime()},{id:104,name:"結訓典禮",time:new Date(2026,11,24,17,0,0).getTime()}]);let notes=load(NOTE_KEY,[]);let todos=load(TODO_KEY,[]);
function load(key,fallback){try{const value=JSON.parse(localStorage.getItem(key));return Array.isArray(value)?value:fallback}catch(e){return fallback}}function save(key,value){localStorage.setItem(key,JSON.stringify(value))}function pad(n){return String(n).padStart(2,"0")}function safe(text){const div=document.createElement("div");div.textContent=text;return div.innerHTML}function formatDateTime(time){const d=new Date(time);return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`}
function diffText(ms,withSeconds=false){if(ms<=0)return"已完成";let sec=Math.floor(ms/1000);const month=Math.floor(sec/(30*24*60*60));sec%=30*24*60*60;const week=Math.floor(sec/(7*24*60*60));sec%=7*24*60*60;const day=Math.floor(sec/(24*60*60));sec%=24*60*60;const min=Math.floor(sec/60);const s=sec%60;return withSeconds?`${month}月 ${week}週 ${day}天 ${min}分 ${s}秒`:`${month}月 ${week}週 ${day}天`}
function updateDate(){const now=new Date();const weekNames=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];todayDate.textContent=`${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;todayWeek.textContent=weekNames[now.getDay()];if(now<COURSE_START){courseDay.textContent="未開訓";courseWeek.textContent="尚未開始"}else{const day=Math.floor((now-COURSE_START)/86400000)+1;courseDay.textContent=`第 ${day} 天`;courseWeek.textContent=`第 ${Math.ceil(day/7)} 週`}}
function updateCountdown(){const now=new Date();const left=COURSE_END-now;const total=COURSE_END-COURSE_START;const passed=now-COURSE_START;if(left<=0){monthLeft.textContent="0";weekLeft.textContent="0";dayLeft.textContent="0";liveCount.textContent="已結訓，辛苦了！";progressLabel.textContent="100.000%";progressBar.style.width="100%";return}let sec=Math.floor(left/1000);monthLeft.textContent=Math.floor(sec/(30*24*60*60));weekLeft.textContent=Math.floor(sec/(7*24*60*60));dayLeft.textContent=Math.floor(sec/(24*60*60));liveCount.textContent=diffText(left,true);let percent=0;if(now<=COURSE_START)percent=0;else if(now>=COURSE_END)percent=100;else percent=Math.max(0,Math.min(100,passed/total*100));progressLabel.textContent=percent.toFixed(3)+"%";progressBar.style.width=percent+"%"}
function addEvent(){const name=eventName.value.trim();const timeValue=eventDate.value;const time=new Date(timeValue).getTime();if(!name){alert("請輸入期程名稱");return}if(!timeValue||isNaN(time)){alert("請選擇日期與時間");return}events.push({id:Date.now(),name,time,createdAt:Date.now(),updatedAt:null});events.sort((a,b)=>a.time-b.time);save(EVENT_KEY,events);eventName.value="";eventDate.value="";renderEvents()}
function deleteEvent(id){if(!confirm("確定刪除此期程？"))return;events=events.filter(e=>e.id!==id);save(EVENT_KEY,events);renderEvents()}
function eventCard(e,now,isHistory=false){return `<div class="event"><div class="event-name">${safe(e.name)}</div><div class="meta">時間：${formatDateTime(e.time)}<br>建立：${e.createdAt?formatDateTime(e.createdAt):"-"}<br>最後修改：${e.updatedAt?formatDateTime(e.updatedAt):"尚未修改"}</div><div class="count">${isHistory?"狀態：已完成":"倒數："+diffText(e.time-now)}</div><div class="actions"><button class="danger" onclick="editEvent(${e.id})" style="background:#dbeafe;color:#1d4ed8">修改</button><button class="danger" onclick="deleteEvent(${e.id})">刪除</button></div></div>`}
function renderEvents(){const now=Date.now();const active=events.filter(e=>e.time>now).sort((a,b)=>a.time-b.time);const history=events.filter(e=>e.time<=now).sort((a,b)=>b.time-a.time);const next=active[0];const others=active.slice(1);nextEvent.innerHTML=next?`<div class="next"><div class="date">${formatDateTime(next.time)}</div><div class="name">${safe(next.name)}</div><div class="left">剩 ${diffText(next.time-now)}</div></div>`:'<div class="empty">目前沒有未來期程</div>';otherSummary.textContent=`其他期程（${others.length} 筆，點開查看）`;otherEvents.innerHTML=others.length?others.map(e=>eventCard(e,now)).join(""):'<div class="empty">沒有其他期程</div>';historySummary.textContent=`歷史期程（${history.length} 筆，點開查看）`;historyEvents.innerHTML=history.length?history.map(e=>eventCard(e,now,true)).join(""):'<div class="empty">沒有歷史期程</div>'}
function addNote(){const course=courseName.value.trim();const text=noteInput.value.trim();if(!course){alert("請輸入課程名稱");return}if(!text){alert("請輸入筆記內容");return}notes.unshift({id:Date.now(),course,text,time:Date.now(),createdAt:Date.now(),updatedAt:null});save(NOTE_KEY,notes);courseName.value="";noteInput.value="";renderNotes()}
function deleteNote(id){if(!confirm("確定刪除此筆記？"))return;notes=notes.filter(n=>n.id!==id);save(NOTE_KEY,notes);renderNotes()}
function renderNotes(){noteList.innerHTML=notes.length?notes.map(n=>`<div class="note"><div class="note-title">【${safe(n.course||n.type||"未分類")}】</div><div class="meta">建立：${n.createdAt?formatDateTime(n.createdAt):formatDateTime(n.time)}<br>最後修改：${n.updatedAt?formatDateTime(n.updatedAt):"尚未修改"}</div><div style="margin-top:8px;line-height:1.6;white-space:pre-wrap">${safe(n.text)}</div><div class="actions"><button class="danger" onclick="editNote(${n.id})" style="background:#dbeafe;color:#1d4ed8">修改</button><button class="danger" onclick="deleteNote(${n.id})">刪除</button></div></div>`).join(""):'<div class="empty">尚無筆記</div>'}
function renderTodos(){todoList.innerHTML=todos.length?todos.map(t=>`<div class="todo"><div class="todo-title">${safe(t.text||t.title||"待辦事項")}</div><div class="meta">${t.done?"狀態：已完成":"狀態：未完成"}</div></div>`).join(""):'<div class="empty">待辦事項升級版會在 v1.1b 完成</div>'}

function editEvent(id){
 const e=events.find(v=>v.id===id); if(!e)return;
 const n=prompt('期程名稱',e.name); if(n===null)return;
 const d=prompt('日期時間(YYYY-MM-DDTHH:MM)',new Date(e.time).toISOString().slice(0,16)); if(d===null)return;
 const t=new Date(d).getTime(); if(isNaN(t)){alert('日期格式錯誤');return;}
 e.name=n||e.name; e.time=t; e.updatedAt=Date.now();
 save(EVENT_KEY,events); renderEvents();
}
function editNote(id){
 const n=notes.find(v=>v.id===id); if(!n)return;
 const c=prompt('課程名稱',n.course); if(c===null)return;
 const txt=prompt('筆記內容',n.text); if(txt===null)return;
 n.course=c||n.course; n.text=txt; n.updatedAt=Date.now();
 save(NOTE_KEY,notes); renderNotes();
}

function tick(){updateDate();updateCountdown();renderEvents()}renderNotes();renderTodos();tick();setInterval(tick,1000);
</script>
</body>
</html>
