<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f766e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="海巡研究班助手" />
<title>海巡研究班助手 v1.2.2</title>
<style>
:root{--main:#0f766e;--main2:#2563eb;--bg1:#e0f2fe;--bg2:#ecfeff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--danger:#ef4444;--warn:#f59e0b}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;color:var(--text);background:linear-gradient(145deg,var(--bg1),var(--bg2))}
.app{max-width:560px;margin:0 auto;padding:18px 16px 34px}
.header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.header h1{margin:0;font-size:25px;font-weight:950;letter-spacing:.5px}.header p{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:700}
.version{padding:8px 11px;border-radius:999px;color:#0f766e;background:rgba(255,255,255,.75);font-size:12px;font-weight:900;box-shadow:0 6px 16px rgba(15,23,42,.06);white-space:nowrap}
.date-card,.card{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.85);box-shadow:0 10px 26px rgba(15,23,42,.08)}
.date-card{border-radius:26px;padding:18px;margin-bottom:14px}.date-label{color:var(--muted);font-size:14px;font-weight:900;margin-bottom:8px}
.date-main{font-size:26px;font-weight:950;color:#0f766e;line-height:1.1}.date-sub{margin-top:8px;font-size:16px;font-weight:900;color:#334155}
.course-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.mini{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:13px}
.mini .k{color:var(--muted);font-size:13px;font-weight:900}.mini .v{margin-top:6px;color:#0f766e;font-size:22px;font-weight:950}
.hero{position:relative;overflow:hidden;color:white;background:linear-gradient(135deg,#0f766e,#2563eb);border-radius:28px;padding:20px 18px;margin-bottom:14px;box-shadow:0 18px 38px rgba(15,118,110,.24)}
.hero:before{content:"";position:absolute;width:150px;height:150px;border-radius:999px;right:-48px;top:-48px;background:rgba(255,255,255,.12)}
.hero h2{margin:0 0 14px;font-size:18px;font-weight:950}.count-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.count-box{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);border-radius:18px;padding:14px 7px;text-align:center;backdrop-filter:blur(8px)}
.count-num{font-size:29px;font-weight:950;line-height:1}.count-label{margin-top:6px;font-size:12px;font-weight:850;opacity:.92}
.live{margin-top:12px;padding:12px;border-radius:16px;background:rgba(255,255,255,.17);text-align:center;font-weight:900;line-height:1.5}
.progress-row{display:flex;justify-content:space-between;margin-top:14px;font-size:13px;font-weight:900}.bar{height:12px;margin-top:7px;border-radius:999px;background:rgba(255,255,255,.30);overflow:hidden}.bar span{display:block;height:100%;width:0%;border-radius:999px;background:white;transition:.35s}
.card{border-radius:24px;padding:17px;margin:14px 0}.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.section-title h2{margin:0;font-size:19px;font-weight:950}
label{display:block;margin:12px 0 6px;color:#334155;font-size:14px;font-weight:900}
input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:15px;padding:13px;background:white;font-size:16px;font-family:inherit}textarea{min-height:90px;resize:vertical}
button{border:none;border-radius:15px;padding:12px 14px;font-family:inherit;font-size:15px;font-weight:950;cursor:pointer}button:active{transform:scale(.985)}
.primary{width:100%;margin-top:12px;background:var(--main);color:white}
.next{background:#fffbeb;border:1px solid #fde68a;border-left:6px solid var(--warn);border-radius:18px;padding:14px}
.next .date,.event-date-strong{color:#0f766e;font-size:15px;font-weight:950;margin-bottom:6px}
.next .name{margin:6px 0;font-size:20px;font-weight:950;word-break:break-word}.next .left{color:#b45309;font-size:15px;font-weight:950}
details{margin-top:12px}summary{list-style:none;padding:13px;border-radius:16px;background:#f1f5f9;color:#334155;font-weight:950;cursor:pointer}summary::-webkit-details-marker{display:none}
.event,.note,.todo,.edit-card{margin-top:10px;padding:13px;border:1px solid var(--line);border-radius:17px;background:#f8fafc}.event{border-left:5px solid var(--main2)}
.edit-card{background:#ecfeff;border:1px solid #99f6e4}.edit-card h3{margin:0 0 8px;font-size:17px;color:#0f766e}
.event-name,.note-title,.todo-title{font-size:16px;font-weight:950;word-break:break-word}
.meta{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.55}.note-created{margin-top:6px;color:#334155;font-size:14px;font-weight:900;line-height:1.5}
.count{margin-top:8px;color:#0f766e;font-size:14px;font-weight:950}.actions{display:flex;gap:8px;margin-top:10px}
.danger,.edit-btn,.save-btn,.cancel-btn{flex:1;padding:9px;border-radius:12px;font-size:14px}.danger{background:#fee2e2;color:#b91c1c}.edit-btn{background:#dbeafe;color:#1d4ed8}.save-btn{background:#0f766e;color:white}.cancel-btn{background:#e2e8f0;color:#334155}
.empty{padding:16px 4px;text-align:center;color:#94a3b8;font-size:14px}.footer{padding:16px;text-align:center;color:#64748b;font-size:12px;line-height:1.6}
@media(max-width:380px){.app{padding:12px 12px 30px}.header h1{font-size:22px}.date-main{font-size:25px}.course-info{grid-template-columns:1fr}.count-num{font-size:24px}}
</style>
</head>
<body>
<main class="app">
<header class="header"><div><h1>海巡研究班助手</h1><p>倒數、期程、待辦、筆記</p></div><div class="version">v1.2.2</div></header>
<section class="date-card"><div class="date-label">今天</div><div class="date-main" id="todayDate">----/--/--</div><div class="date-sub" id="todayWeek">星期-</div><div class="course-info"><div class="mini"><div class="k">訓期天數</div><div class="v" id="courseDay">第 -- 天</div></div><div class="mini"><div class="k">目前週次</div><div class="v" id="courseWeek">第 -- 週</div></div></div></section>
<section class="hero"><h2>距離結訓</h2><div class="count-grid"><div class="count-box"><div class="count-num" id="monthLeft">--</div><div class="count-label">月</div></div><div class="count-box"><div class="count-num" id="weekLeft">--</div><div class="count-label">週</div></div><div class="count-box"><div class="count-num" id="dayLeft">--</div><div class="count-label">天</div></div></div><div class="live" id="liveCount">計算中...</div><div class="progress-row"><span>訓期進度</span><span id="progressLabel">--.---%</span></div><div class="bar"><span id="progressBar"></span></div></section>
<section class="card"><div class="section-title"><h2>最近重要期程</h2></div><div id="nextEvent"></div><details><summary id="otherSummary">其他期程</summary><div id="otherEvents"></div></details><details><summary id="historySummary">歷史期程</summary><div id="historyEvents"></div></details></section>
<section class="card"><div class="section-title"><h2>新增重要期程</h2></div><label for="eventName">期程名稱</label><input id="eventName" placeholder="例如：期中考、期末考、專題報告日"><label for="eventDate">日期與時間</label><input id="eventDate" type="datetime-local"><button class="primary" onclick="addEvent()">新增期程</button></section>
<section class="card"><div class="section-title"><h2>待辦事項</h2></div><div id="todoList"></div></section>
<section class="card"><div class="section-title"><h2>上課筆記</h2></div><label for="courseName">課程名稱</label><input id="courseName" placeholder="例如：IMO、AI課程、海洋法"><label for="noteInput">筆記內容</label><textarea id="noteInput" placeholder="輸入今天上課重點..."></textarea><button class="primary" onclick="addNote()">新增筆記</button><div id="noteList"></div></section>
<div class="footer">開訓：2026/06/29｜結訓：2026/12/24 17:00<br>v1.2.2：修正修改期程時輸入框跳掉問題。</div>
</main>
<script>
const COURSE_START=new Date(2026,5,29,0,0,0),COURSE_END=new Date(2026,11,24,17,0,0);
const EVENT_KEY="cg_v1_events",NOTE_KEY="cg_v1_notes",TODO_KEY="cg_v1_todos";
let events=load(EVENT_KEY,[{id:101,name:"專題報告期程規劃",time:new Date(2026,6,10,9,0,0).getTime()},{id:102,name:"期中考（可自行修改）",time:new Date(2026,8,25,9,0,0).getTime()},{id:103,name:"期末考（可自行修改）",time:new Date(2026,11,10,9,0,0).getTime()},{id:104,name:"結訓典禮",time:new Date(2026,11,24,17,0,0).getTime()}]);
let notes=load(NOTE_KEY,[]),todos=load(TODO_KEY,[]),editingEventId=null,editingNoteId=null;
events=events.map(e=>({createdAt:e.createdAt||e.time||Date.now(),updatedAt:e.updatedAt||null,...e}));notes=notes.map(n=>({createdAt:n.createdAt||n.time||Date.now(),updatedAt:n.updatedAt||null,...n}));save(EVENT_KEY,events);save(NOTE_KEY,notes);
function load(k,f){try{const v=JSON.parse(localStorage.getItem(k));return Array.isArray(v)?v:f}catch(e){return f}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function pad(n){return String(n).padStart(2,"0")}function safe(t){const d=document.createElement("div");d.textContent=t||"";return d.innerHTML}
function inputDateTime(t){const d=new Date(t);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`}
function formatDateTime(t){const d=new Date(t);return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`}
function diffText(ms,s=false){if(ms<=0)return"已完成";let x=Math.floor(ms/1000),m=Math.floor(x/(30*24*60*60));x%=30*24*60*60;let w=Math.floor(x/(7*24*60*60));x%=7*24*60*60;let d=Math.floor(x/(24*60*60));x%=24*60*60;let min=Math.floor(x/60),sec=x%60;return s?`${m}月 ${w}週 ${d}天 ${min}分 ${sec}秒`:`${m}月 ${w}週 ${d}天`}
function updateDate(){const n=new Date(),ws=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];todayDate.textContent=`${n.getFullYear()}/${pad(n.getMonth()+1)}/${pad(n.getDate())}`;todayWeek.textContent=ws[n.getDay()];if(n<COURSE_START){courseDay.textContent="未開訓";courseWeek.textContent="尚未開始"}else{const d=Math.floor((n-COURSE_START)/86400000)+1;courseDay.textContent=`第 ${d} 天`;courseWeek.textContent=`第 ${Math.ceil(d/7)} 週`}}
function updateCountdown(){const n=new Date(),l=COURSE_END-n,total=COURSE_END-COURSE_START,passed=n-COURSE_START;if(l<=0){monthLeft.textContent="0";weekLeft.textContent="0";dayLeft.textContent="0";liveCount.textContent="已結訓，辛苦了！";progressLabel.textContent="100.000%";progressBar.style.width="100%";return}let s=Math.floor(l/1000);monthLeft.textContent=Math.floor(s/(30*24*60*60));weekLeft.textContent=Math.floor(s/(7*24*60*60));dayLeft.textContent=Math.floor(s/(24*60*60));liveCount.textContent=diffText(l,true);let p=n<=COURSE_START?0:n>=COURSE_END?100:Math.max(0,Math.min(100,passed/total*100));progressLabel.textContent=p.toFixed(3)+"%";progressBar.style.width=p+"%"}
function addEvent(){const name=eventName.value.trim(),tv=eventDate.value,time=new Date(tv).getTime();if(!name){alert("請輸入期程名稱");return}if(!tv||isNaN(time)){alert("請選擇日期與時間");return}events.push({id:Date.now(),name,time,createdAt:Date.now(),updatedAt:null});events.sort((a,b)=>a.time-b.time);save(EVENT_KEY,events);eventName.value="";eventDate.value="";renderEvents()}
function startEditEvent(id){editingEventId=id;renderEvents()}function cancelEditEvent(){editingEventId=null;renderEvents()}
function saveEditEvent(id){const name=document.getElementById(`editEventName-${id}`).value.trim(),tv=document.getElementById(`editEventDate-${id}`).value,time=new Date(tv).getTime();if(!name){alert("請輸入期程名稱");return}if(!tv||isNaN(time)){alert("請選擇日期與時間");return}events=events.map(e=>e.id===id?{...e,name,time,updatedAt:Date.now()}:e).sort((a,b)=>a.time-b.time);editingEventId=null;save(EVENT_KEY,events);renderEvents()}
function deleteEvent(id){if(!confirm("確定刪除此期程？"))return;events=events.filter(e=>e.id!==id);save(EVENT_KEY,events);renderEvents()}
function editEventCard(e){return `<div class="edit-card"><h3>修改重要期程</h3><label>期程名稱</label><input id="editEventName-${e.id}" value="${safe(e.name)}"><label>日期與時間</label><input id="editEventDate-${e.id}" type="datetime-local" value="${inputDateTime(e.time)}"><div class="actions"><button class="cancel-btn" onclick="cancelEditEvent()">取消</button><button class="save-btn" onclick="saveEditEvent(${e.id})">儲存</button></div></div>`}
function eventCard(e,now,isHistory=false){if(editingEventId===e.id)return editEventCard(e);return `<div class="event"><div class="event-date-strong">${formatDateTime(e.time)}</div><div class="event-name">${safe(e.name)}</div><div class="count">${isHistory?"狀態：已完成":"倒數："+diffText(e.time-now)}</div><div class="actions"><button class="edit-btn" onclick="startEditEvent(${e.id})">修改</button><button class="danger" onclick="deleteEvent(${e.id})">刪除</button></div></div>`}
function renderEvents(){const now=Date.now(),active=events.filter(e=>e.time>now).sort((a,b)=>a.time-b.time),history=events.filter(e=>e.time<=now).sort((a,b)=>b.time-a.time),next=active[0],others=active.slice(1);if(next){nextEvent.innerHTML=editingEventId===next.id?editEventCard(next):`<div class="next"><div class="date">${formatDateTime(next.time)}</div><div class="name">${safe(next.name)}</div><div class="left">剩 ${diffText(next.time-now)}</div><div class="actions"><button class="edit-btn" onclick="startEditEvent(${next.id})">修改</button><button class="danger" onclick="deleteEvent(${next.id})">刪除</button></div></div>`}else nextEvent.innerHTML='<div class="empty">目前沒有未來期程</div>';otherSummary.textContent=`其他期程（${others.length} 筆，點開查看）`;otherEvents.innerHTML=others.length?others.map(e=>eventCard(e,now)).join(""):'<div class="empty">沒有其他期程</div>';historySummary.textContent=`歷史期程（${history.length} 筆，點開查看）`;historyEvents.innerHTML=history.length?history.map(e=>eventCard(e,now,true)).join(""):'<div class="empty">沒有歷史期程</div>'}
function addNote(){const course=courseName.value.trim(),text=noteInput.value.trim();if(!course){alert("請輸入課程名稱");return}if(!text){alert("請輸入筆記內容");return}notes.unshift({id:Date.now(),course,text,time:Date.now(),createdAt:Date.now(),updatedAt:null});save(NOTE_KEY,notes);courseName.value="";noteInput.value="";renderNotes()}
function startEditNote(id){editingNoteId=id;renderNotes()}function cancelEditNote(){editingNoteId=null;renderNotes()}
function saveEditNote(id){const course=document.getElementById(`editNoteCourse-${id}`).value.trim(),text=document.getElementById(`editNoteText-${id}`).value.trim();if(!course){alert("請輸入課程名稱");return}if(!text){alert("請輸入筆記內容");return}notes=notes.map(n=>n.id===id?{...n,course,text,updatedAt:Date.now()}:n);editingNoteId=null;save(NOTE_KEY,notes);renderNotes()}
function deleteNote(id){if(!confirm("確定刪除此筆記？"))return;notes=notes.filter(n=>n.id!==id);save(NOTE_KEY,notes);renderNotes()}
function noteEditCard(n){return `<div class="edit-card"><h3>修改上課筆記</h3><label>課程名稱</label><input id="editNoteCourse-${n.id}" value="${safe(n.course||n.type||"未分類")}"><label>筆記內容</label><textarea id="editNoteText-${n.id}">${safe(n.text)}</textarea><div class="actions"><button class="cancel-btn" onclick="cancelEditNote()">取消</button><button class="save-btn" onclick="saveEditNote(${n.id})">儲存</button></div></div>`}
function renderNotes(){noteList.innerHTML=notes.length?notes.map(n=>{if(editingNoteId===n.id)return noteEditCard(n);return `<div class="note"><div class="note-title">【${safe(n.course||n.type||"未分類")}】</div><div class="note-created">建立：${n.createdAt?formatDateTime(n.createdAt):formatDateTime(n.time)}</div><div style="margin-top:8px;line-height:1.6;white-space:pre-wrap">${safe(n.text)}</div><div class="actions"><button class="edit-btn" onclick="startEditNote(${n.id})">修改</button><button class="danger" onclick="deleteNote(${n.id})">刪除</button></div></div>`}).join(""):'<div class="empty">尚無筆記</div>'}
function renderTodos(){todoList.innerHTML=todos.length?todos.map(t=>`<div class="todo"><div class="todo-title">${safe(t.text||t.title||"待辦事項")}</div><div class="meta">${t.done?"狀態：已完成":"狀態：未完成"}</div></div>`).join(""):'<div class="empty">待辦事項升級版會在 v1.3.0 完成</div>'}
function tick(){
  updateDate();
  updateCountdown();
  if(editingEventId===null){
    renderEvents();
  }
}
renderNotes();
renderTodos();
tick();
setInterval(tick,1000);
</script>
</body>
</html>
