<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f766e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="海巡研究班助手" />
<title>海巡研究班助手 v1.3.1</title>
<style>
:root{--main:#0f766e;--main2:#2563eb;--bg1:#e0f2fe;--bg2:#ecfeff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--danger:#ef4444;--warn:#f59e0b}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;color:var(--text);background:linear-gradient(145deg,var(--bg1),var(--bg2))}
.app{max-width:560px;margin:0 auto;padding:18px 16px 34px}
.header{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
.header h1{margin:0;font-size:25px;font-weight:950;letter-spacing:.5px}.header p{margin:5px 0 0;color:var(--muted);font-size:13px;font-weight:700}
.version{padding:8px 11px;border-radius:999px;color:#0f766e;background:rgba(255,255,255,.75);font-size:12px;font-weight:900;box-shadow:0 6px 16px rgba(15,23,42,.06);white-space:nowrap}
.date-card,.card{background:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.85);box-shadow:0 10px 26px rgba(15,23,42,.08)}
.date-card{border-radius:26px;padding:18px;margin-bottom:14px}.date-label{color:var(--muted);font-size:14px;font-weight:900;margin-bottom:8px}
.date-main{font-size:26px;font-weight:950;color:#0f766e;line-height:1.1}.date-sub{margin-top:8px;font-size:16px;font-weight:900;color:#334155}
.course-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.mini{background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:13px}
.mini .k{color:var(--muted);font-size:13px;font-weight:900}.mini .v{margin-top:6px;color:#0f766e;font-size:22px;font-weight:950}
.hero{position:relative;overflow:hidden;color:white;background:linear-gradient(135deg,#0f766e,#2563eb);border-radius:28px;padding:20px 18px;margin-bottom:14px;box-shadow:0 18px 38px rgba(15,118,110,.24)}
.hero:before{content:"";position:absolute;width:150px;height:150px;border-radius:999px;right:-48px;top:-48px;background:rgba(255,255,255,.12)}
.hero h2{margin:0 0 14px;font-size:18px;font-weight:950}.count-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.count-box{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.25);border-radius:18px;padding:14px 7px;text-align:center;backdrop-filter:blur(8px)}
.count-num{font-size:29px;font-weight:950;line-height:1}.count-label{margin-top:6px;font-size:12px;font-weight:850;opacity:.92}
.live{margin-top:12px;padding:12px;border-radius:16px;background:rgba(255,255,255,.17);text-align:center;font-weight:900;line-height:1.5}
.progress-row{display:flex;justify-content:space-between;margin-top:14px;font-size:13px;font-weight:900}.bar{height:12px;margin-top:7px;border-radius:999px;background:rgba(255,255,255,.30);overflow:hidden}.bar span{display:block;height:100%;width:0%;border-radius:999px;background:white;transition:.35s}
.card{border-radius:24px;padding:17px;margin:14px 0}.section-title{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}.section-title h2{margin:0;font-size:19px;font-weight:950}
label{display:block;margin:12px 0 6px;color:#334155;font-size:14px;font-weight:900}
input,textarea{width:100%;border:1px solid #cbd5e1;border-radius:15px;padding:13px;background:white;font-size:16px;font-family:inherit}textarea{min-height:90px;resize:vertical}
button{border:none;border-radius:15px;padding:12px 14px;font-family:inherit;font-size:15px;font-weight:950;cursor:pointer}button:active{transform:scale(.985)}
.primary{width:100%;margin-top:12px;background:var(--main);color:white}
.next{background:#fffbeb;border:1px solid #fde68a;border-left:6px solid var(--warn);border-radius:18px;padding:14px}
.next .date,.event-date-strong{color:#0f766e;font-size:15px;font-weight:950;margin-bottom:6px}
.next .name{margin:6px 0;font-size:20px;font-weight:950;word-break:break-word}.next .left{color:#b45309;font-size:15px;font-weight:950}
details{margin-top:12px}summary{list-style:none;padding:13px;border-radius:16px;background:#f1f5f9;color:#334155;font-weight:950;cursor:pointer}summary::-webkit-details-marker{display:none}
.event,.note,.todo,.edit-card{margin-top:10px;padding:13px;border:1px solid var(--line);border-radius:17px;background:#f8fafc}.event{border-left:5px solid var(--main2)}
.todo{background:white}
.todo.high{border-left:5px solid #ef4444}
.todo.medium{border-left:5px solid #f59e0b}
.todo.low{border-left:5px solid #22c55e}
.todo.done{opacity:.62;background:#f1f5f9}
.todo.done .todo-title{text-decoration:line-through}
.todo-top{display:flex;align-items:flex-start;gap:10px}
.todo-check{width:24px;height:24px;margin-top:1px;accent-color:#0f766e;flex:0 0 auto}
.todo-main{flex:1;min-width:0}
.todo-badge{display:inline-block;margin-top:6px;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:950}
.todo-badge.high{background:#fee2e2;color:#b91c1c}
.todo-badge.medium{background:#fef3c7;color:#b45309}
.todo-badge.low{background:#dcfce7;color:#15803d}
.todo-due{margin-top:6px;font-size:13px;font-weight:900;color:#475569}
.todo-due.today,.todo-due.overdue{color:#b91c1c}
.todo-section-label{margin-top:14px;padding-top:4px;font-size:14px;font-weight:950;color:#334155}
.todo-form{margin-top:12px}.add-panel{margin-top:14px}.add-panel summary{background:#ecfeff;color:#0f766e;border:1px solid #99f6e4}.add-panel[open] summary{border-radius:16px 16px 0 0}.add-panel-body{padding:4px 2px 2px}.display-first{margin-bottom:12px}
.edit-card{background:#ecfeff;border:1px solid #99f6e4}.edit-card h3{margin:0 0 8px;font-size:17px;color:#0f766e}
.event-name,.note-title,.todo-title{font-size:16px;font-weight:950;word-break:break-word}
.meta{margin-top:5px;color:var(--muted);font-size:12px;line-height:1.55}.note-created{margin-top:6px;color:#334155;font-size:14px;font-weight:900;line-height:1.5}
.note-group{margin-top:10px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:#f8fafc}
.note-group summary{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0;border-radius:0;background:#f1f5f9;padding:15px 14px}
.note-group-name{font-size:17px;font-weight:950;color:#0f172a;word-break:break-word}
.note-group-count{flex:0 0 auto;padding:5px 9px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-size:12px;font-weight:950}
.note-group-content{padding:2px 12px 12px}
.note-group .note{background:white}
.count{margin-top:8px;color:#0f766e;font-size:14px;font-weight:950}.actions{display:flex;gap:8px;margin-top:10px}
.danger,.edit-btn,.save-btn,.cancel-btn{flex:1;padding:9px;border-radius:12px;font-size:14px}.danger{background:#fee2e2;color:#b91c1c}.edit-btn{background:#dbeafe;color:#1d4ed8}.save-btn{background:#0f766e;color:white}.cancel-btn{background:#e2e8f0;color:#334155}
.empty{padding:16px 4px;text-align:center;color:#94a3b8;font-size:14px}.hint{font-size:12px;color:#64748b;line-height:1.5;margin-top:6px}.week-tag{display:inline-block;margin-top:6px;padding:5px 9px;border-radius:999px;background:#e0f2fe;color:#0369a1;font-size:13px;font-weight:950}.footer{padding:16px;text-align:center;color:#64748b;font-size:12px;line-height:1.6}
@media(max-width:380px){.app{padding:12px 12px 30px}.header h1{font-size:22px}.date-main{font-size:25px}.course-info{grid-template-columns:1fr}.count-num{font-size:24px}}
</style>
</head>
<body>
<main class="app">
<header class="header"><div><h1>海巡研究班助手</h1><p>倒數、期程、待辦、筆記</p></div><div class="version">v1.3.1</div></header>
<section class="date-card"><div class="date-label">今天</div><div class="date-main" id="todayDate">----/--/--</div><div class="date-sub" id="todayWeek">星期-</div><div class="course-info"><div class="mini"><div class="k">訓期天數</div><div class="v" id="courseDay">第 -- 天</div></div><div class="mini"><div class="k">目前週次</div><div class="v" id="courseWeek">第 -- 週</div></div></div></section>
<section class="hero"><h2>距離結訓</h2><div class="count-grid"><div class="count-box"><div class="count-num" id="monthLeft">--</div><div class="count-label">月</div></div><div class="count-box"><div class="count-num" id="weekLeft">--</div><div class="count-label">週</div></div><div class="count-box"><div class="count-num" id="dayLeft">--</div><div class="count-label">天</div></div></div><div class="live" id="liveCount">計算中...</div><div class="progress-row"><span>訓期進度</span><span id="progressLabel">--.---%</span></div><div class="bar"><span id="progressBar"></span></div></section>
<section class="card"><div class="section-title"><h2>重要期程</h2></div><div class="display-first"><div id="nextEvent"></div><details><summary id="otherSummary">其他期程</summary><div id="otherEvents"></div></details><details><summary id="historySummary">歷史期程</summary><div id="historyEvents"></div></details></div><details class="add-panel"><summary>＋ 新增重要期程</summary><div class="add-panel-body"><label for="eventName">期程名稱</label><input id="eventName" placeholder="例如：期中考、期末考、專題報告日"><label for="eventDate">日期與時間（已確定時填寫）</label><input id="eventDate" type="datetime-local"><div class="hint">如果還不確定日期，可以先填下面「第幾週」。日期確定後可再修改成精準時間。</div><label for="eventWeek">第幾週（日期未定時使用）</label><input id="eventWeek" type="number" min="1" max="26" placeholder="例如：第 8 週就輸入 8"><button class="primary" onclick="addEvent()">新增期程</button></div></details></section>
<section class="card"><div class="section-title"><h2>待辦事項</h2></div><div id="todoList" class="display-first"></div><details class="add-panel"><summary>＋ 新增待辦事項</summary><div class="add-panel-body todo-form"><label for="todoInput">待辦內容</label><input id="todoInput" placeholder="例如：整理刑法重點"><label for="todoPriority">優先等級</label><select id="todoPriority" style="width:100%;border:1px solid #cbd5e1;border-radius:15px;padding:13px;background:white;font-size:16px;font-family:inherit"><option value="high">高</option><option value="medium" selected>中</option><option value="low">低</option></select><label for="todoDue">到期日期與時間（可不填）</label><input id="todoDue" type="datetime-local"><button class="primary" onclick="addTodo()">新增待辦</button></div></details></section>
<section class="card"><div class="section-title"><h2>上課筆記</h2></div><div id="noteList" class="display-first"></div><details class="add-panel"><summary>＋ 新增上課筆記</summary><div class="add-panel-body"><label for="courseName">課程名稱</label><input id="courseName" placeholder="例如：IMO、AI課程、海洋法"><label for="noteInput">筆記內容</label><textarea id="noteInput" placeholder="輸入今天上課重點..."></textarea><button class="primary" onclick="addNote()">新增筆記</button></div></details></section>
<div class="footer">開訓：2026/06/29｜結訓：2026/12/24 17:00<br>v1.3.1：待辦新增時間；重要期程、待辦與筆記輸入區移至下方並改為收合。</div>
</main>
<script>
const COURSE_START=new Date(2026,5,29,0,0,0),COURSE_END=new Date(2026,11,24,17,0,0);
const EVENT_KEY="cg_v1_events",NOTE_KEY="cg_v1_notes",TODO_KEY="cg_v1_todos";
let events=load(EVENT_KEY,[{id:101,name:"專題報告期程規劃",time:new Date(2026,6,10,9,0,0).getTime()},{id:102,name:"期中考（可自行修改）",time:new Date(2026,8,25,9,0,0).getTime()},{id:103,name:"期末考（可自行修改）",time:new Date(2026,11,10,9,0,0).getTime()},{id:104,name:"結訓典禮",time:new Date(2026,11,24,17,0,0).getTime()}]);
let notes=load(NOTE_KEY,[]),todos=load(TODO_KEY,[]),editingEventId=null,editingNoteId=null;
events=events.map(e=>({createdAt:e.createdAt||e.time||Date.now(),updatedAt:e.updatedAt||null,week:e.week||null,...e}));notes=notes.map(n=>({createdAt:n.createdAt||n.time||Date.now(),updatedAt:n.updatedAt||null,...n}));save(EVENT_KEY,events);save(NOTE_KEY,notes);
function load(k,f){try{const v=JSON.parse(localStorage.getItem(k));return Array.isArray(v)?v:f}catch(e){return f}}function save(k,v){localStorage.setItem(k,JSON.stringify(v))}
function pad(n){return String(n).padStart(2,"0")}function safe(t){const d=document.createElement("div");d.textContent=t||"";return d.innerHTML}
function inputDateTime(t){const d=new Date(t);return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`}
function formatDateTime(t){const d=new Date(t);return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`}
function weekApproxTime(week){
  return COURSE_START.getTime()+((Number(week)||1)-1)*7*86400000;
}
function eventSortValue(e){
  return e.time || weekApproxTime(e.week || 999);
}
function eventDateLabel(e){
  if(e.time)return formatDateTime(e.time);
  return `第 ${e.week} 週（日期未定）`;
}
function eventLeftText(e,now){
  if(e.time)return diffText(e.time-now);
  if(e.week){
    const approx=weekApproxTime(e.week);
    if(approx-now<=0)return "已進入或已超過該週";
    return "約 " + diffText(approx-now);
  }
  return "日期未定";
}

function diffText(ms,s=false){if(ms<=0)return"已完成";let x=Math.floor(ms/1000),m=Math.floor(x/(30*24*60*60));x%=30*24*60*60;let w=Math.floor(x/(7*24*60*60));x%=7*24*60*60;let d=Math.floor(x/(24*60*60));x%=24*60*60;let min=Math.floor(x/60),sec=x%60;return s?`${m}月 ${w}週 ${d}天 ${min}分 ${sec}秒`:`${m}月 ${w}週 ${d}天`}
function updateDate(){const n=new Date(),ws=["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];todayDate.textContent=`${n.getFullYear()}/${pad(n.getMonth()+1)}/${pad(n.getDate())}`;todayWeek.textContent=ws[n.getDay()];if(n<COURSE_START){courseDay.textContent="未開訓";courseWeek.textContent="尚未開始"}else{const d=Math.floor((n-COURSE_START)/86400000)+1;courseDay.textContent=`第 ${d} 天`;courseWeek.textContent=`第 ${Math.ceil(d/7)} 週`}}
function updateCountdown(){const n=new Date(),l=COURSE_END-n,total=COURSE_END-COURSE_START,passed=n-COURSE_START;if(l<=0){monthLeft.textContent="0";weekLeft.textContent="0";dayLeft.textContent="0";liveCount.textContent="已結訓，辛苦了！";progressLabel.textContent="100.000%";progressBar.style.width="100%";return}let s=Math.floor(l/1000);monthLeft.textContent=Math.floor(s/(30*24*60*60));weekLeft.textContent=Math.floor(s/(7*24*60*60));dayLeft.textContent=Math.floor(s/(24*60*60));liveCount.textContent=diffText(l,true);let p=n<=COURSE_START?0:n>=COURSE_END?100:Math.max(0,Math.min(100,passed/total*100));progressLabel.textContent=p.toFixed(3)+"%";progressBar.style.width=p+"%"}
function addEvent(){
const name=eventName.value.trim(),tv=eventDate.value,wv=eventWeek.value.trim();
const time=tv?new Date(tv).getTime():null;
const week=wv?Number(wv):null;
if(!name){alert("請輸入期程名稱");return}
if(tv&&isNaN(time)){alert("日期格式錯誤");return}
if(!tv&&(!week||week<1)){alert("請選擇日期與時間，或輸入第幾週");return}
events.push({id:Date.now(),name,time,week,createdAt:Date.now(),updatedAt:null});
events.sort((a,b)=>eventSortValue(a)-eventSortValue(b));save(EVENT_KEY,events);
eventName.value="";eventDate.value="";eventWeek.value="";renderEvents()}
function startEditEvent(id){editingEventId=id;renderEvents()}function cancelEditEvent(){editingEventId=null;renderEvents()}
function saveEditEvent(id){
const name=document.getElementById(`editEventName-${id}`).value.trim();
const tv=document.getElementById(`editEventDate-${id}`).value;
const wv=document.getElementById(`editEventWeek-${id}`).value.trim();
const time=tv?new Date(tv).getTime():null;
const week=wv?Number(wv):null;
if(!name){alert("請輸入期程名稱");return}
if(tv&&isNaN(time)){alert("日期格式錯誤");return}
if(!tv&&(!week||week<1)){alert("請選擇日期與時間，或輸入第幾週");return}
events=events.map(e=>e.id===id?{...e,name,time,week,updatedAt:Date.now()}:e).sort((a,b)=>eventSortValue(a)-eventSortValue(b));
editingEventId=null;save(EVENT_KEY,events);renderEvents()}
function deleteEvent(id){if(!confirm("確定刪除此期程？"))return;events=events.filter(e=>e.id!==id);save(EVENT_KEY,events);renderEvents()}
function clearEventDate(id){
  const dateInput=document.getElementById(`editEventDate-${id}`);
  const weekInput=document.getElementById(`editEventWeek-${id}`);
  if(dateInput)dateInput.value="";
  if(weekInput&&!weekInput.value)weekInput.focus();
}
function editEventCard(e){return `<div class="edit-card"><h3>修改重要期程</h3><label>期程名稱</label><input id="editEventName-${e.id}" value="${safe(e.name)}"><label>日期與時間（已確定時填寫）</label><input id="editEventDate-${e.id}" type="datetime-local" value="${e.time?inputDateTime(e.time):""}"><button class="cancel-btn" type="button" onclick="clearEventDate(${e.id})" style="width:100%;margin-top:8px">改回日期未定／改用第幾週</button><div class="hint">要改回週次：先按上方按鈕清空日期，再填寫第幾週，最後按儲存。</div><label>第幾週（日期未定時使用）</label><input id="editEventWeek-${e.id}" type="number" min="1" max="26" value="${e.week||""}" placeholder="例如：8"><div class="actions"><button class="cancel-btn" onclick="cancelEditEvent()">取消</button><button class="save-btn" onclick="saveEditEvent(${e.id})">儲存</button></div></div>`}
function eventCard(e,now,isHistory=false){if(editingEventId===e.id)return editEventCard(e);return `<div class="event"><div class="event-date-strong">${eventDateLabel(e)}</div><div class="event-name">${safe(e.name)}</div>${e.week&&!e.time?`<div class="week-tag">暫定第 ${e.week} 週</div>`:""}<div class="count">${isHistory?"狀態：已完成":"倒數："+eventLeftText(e,now)}</div><div class="actions"><button class="edit-btn" onclick="startEditEvent(${e.id})">修改</button><button class="danger" onclick="deleteEvent(${e.id})">刪除</button></div></div>`}
function renderEvents(){
const now=Date.now();
const active=events.filter(e=>(e.time&&e.time>now)||(!e.time&&e.week&&weekApproxTime(e.week)+7*86400000>now)).sort((a,b)=>eventSortValue(a)-eventSortValue(b));
const history=events.filter(e=>(e.time&&e.time<=now)||(!e.time&&e.week&&weekApproxTime(e.week)+7*86400000<=now)).sort((a,b)=>eventSortValue(b)-eventSortValue(a));
const next=active[0],others=active.slice(1);
if(next){nextEvent.innerHTML=editingEventId===next.id?editEventCard(next):`<div class="next"><div class="date">${eventDateLabel(next)}</div><div class="name">${safe(next.name)}</div>${next.week&&!next.time?`<div class="week-tag">暫定第 ${next.week} 週</div>`:""}<div class="left">剩 ${eventLeftText(next,now)}</div><div class="actions"><button class="edit-btn" onclick="startEditEvent(${next.id})">修改</button><button class="danger" onclick="deleteEvent(${next.id})">刪除</button></div></div>`}else nextEvent.innerHTML='<div class="empty">目前沒有未來期程</div>';
otherSummary.textContent=`其他期程（${others.length} 筆，點開查看）`;
otherEvents.innerHTML=others.length?others.map(e=>eventCard(e,now)).join(""):'<div class="empty">沒有其他期程</div>';
historySummary.textContent=`歷史期程（${history.length} 筆，點開查看）`;
historyEvents.innerHTML=history.length?history.map(e=>eventCard(e,now,true)).join(""):'<div class="empty">沒有歷史期程</div>'}
function addNote(){const course=courseName.value.trim(),text=noteInput.value.trim();if(!course){alert("請輸入課程名稱");return}if(!text){alert("請輸入筆記內容");return}notes.unshift({id:Date.now(),course,text,time:Date.now(),createdAt:Date.now(),updatedAt:null});save(NOTE_KEY,notes);courseName.value="";noteInput.value="";renderNotes()}
function startEditNote(id){editingNoteId=id;renderNotes()}function cancelEditNote(){editingNoteId=null;renderNotes()}
function saveEditNote(id){const course=document.getElementById(`editNoteCourse-${id}`).value.trim(),text=document.getElementById(`editNoteText-${id}`).value.trim();if(!course){alert("請輸入課程名稱");return}if(!text){alert("請輸入筆記內容");return}notes=notes.map(n=>n.id===id?{...n,course,text,updatedAt:Date.now()}:n);editingNoteId=null;save(NOTE_KEY,notes);renderNotes()}
function deleteNote(id){if(!confirm("確定刪除此筆記？"))return;notes=notes.filter(n=>n.id!==id);save(NOTE_KEY,notes);renderNotes()}
function noteEditCard(n){return `<div class="edit-card"><h3>修改上課筆記</h3><label>課程名稱</label><input id="editNoteCourse-${n.id}" value="${safe(n.course||n.type||"未分類")}"><label>筆記內容</label><textarea id="editNoteText-${n.id}">${safe(n.text)}</textarea><div class="actions"><button class="cancel-btn" onclick="cancelEditNote()">取消</button><button class="save-btn" onclick="saveEditNote(${n.id})">儲存</button></div></div>`}
function renderNotes(){
if(!notes.length){noteList.innerHTML='<div class="empty">尚無筆記</div>';return}
const groups={};
notes.forEach(n=>{const course=(n.course||n.type||"未分類").trim()||"未分類";if(!groups[course])groups[course]=[];groups[course].push(n)});
noteList.innerHTML=Object.entries(groups).map(([course,items])=>{
items.sort((a,b)=>(b.createdAt||b.time||0)-(a.createdAt||a.time||0));
const hasEditing=items.some(n=>n.id===editingNoteId);
const records=items.map(n=>{if(editingNoteId===n.id)return noteEditCard(n);return `<div class="note"><div class="note-created">建立：${n.createdAt?formatDateTime(n.createdAt):formatDateTime(n.time)}</div><div style="margin-top:8px;line-height:1.6;white-space:pre-wrap">${safe(n.text)}</div><div class="actions"><button class="edit-btn" onclick="startEditNote(${n.id})">修改</button><button class="danger" onclick="deleteNote(${n.id})">刪除</button></div></div>`}).join("");
return `<details class="note-group" ${hasEditing?"open":""}><summary><span class="note-group-name">${safe(course)}</span><span class="note-group-count">${items.length} 筆</span></summary><div class="note-group-content">${records}</div></details>`
}).join("")
}
function addTodo(){
  const text=todoInput.value.trim();
  const priority=todoPriority.value;
  const due=todoDue.value||null;
  if(!text){alert("請輸入待辦內容");return}
  todos.push({id:Date.now(),text,priority,due,done:false,createdAt:Date.now()});
  save(TODO_KEY,todos);
  todoInput.value="";
  todoPriority.value="medium";
  todoDue.value="";
  renderTodos();
}
function toggleTodo(id){
  todos=todos.map(t=>t.id===id?{...t,done:!t.done}:t);
  save(TODO_KEY,todos);
  renderTodos();
}
function deleteTodo(id){
  if(!confirm("確定刪除此待辦？"))return;
  todos=todos.filter(t=>t.id!==id);
  save(TODO_KEY,todos);
  renderTodos();
}
function priorityLabel(p){
  return p==="high"?"高":p==="low"?"低":"中";
}
function dueLabel(due){
  if(!due)return {text:"無期限",cls:""};
  const now=new Date(),d=new Date(due);
  if(isNaN(d.getTime()))return {text:"日期格式錯誤",cls:"overdue"};
  const sameDay=d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate();
  const tomorrow=new Date(now);tomorrow.setDate(now.getDate()+1);
  const isTomorrow=d.getFullYear()===tomorrow.getFullYear()&&d.getMonth()===tomorrow.getMonth()&&d.getDate()===tomorrow.getDate();
  const dateText=`${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if(d<now)return {text:`已逾期｜${dateText}`,cls:"overdue"};
  if(sameDay)return {text:`今天 ${pad(d.getHours())}:${pad(d.getMinutes())} 到期`,cls:"today"};
  if(isTomorrow)return {text:`明天 ${pad(d.getHours())}:${pad(d.getMinutes())} 到期`,cls:""};
  return {text:dateText,cls:""};
}
function renderTodoCard(t){
  const p=t.priority||"medium";
  const due=dueLabel(t.due);
  return `<div class="todo ${p} ${t.done?"done":""}">
    <div class="todo-top">
      <input class="todo-check" type="checkbox" ${t.done?"checked":""} onchange="toggleTodo(${t.id})">
      <div class="todo-main">
        <div class="todo-title">${safe(t.text||t.title||"待辦事項")}</div>
        <div class="todo-badge ${p}">優先：${priorityLabel(p)}</div>
        <div class="todo-due ${due.cls}">${due.text}</div>
      </div>
    </div>
    <div class="actions"><button class="danger" onclick="deleteTodo(${t.id})">刪除</button></div>
  </div>`;
}
function renderTodos(){
  if(!todos.length){
    todoList.innerHTML='<div class="empty">尚無待辦事項</div>';
    return;
  }
  const order={high:0,medium:1,low:2};
  const active=todos.filter(t=>!t.done).sort((a,b)=>{
    const pa=order[a.priority||"medium"],pb=order[b.priority||"medium"];
    if(pa!==pb)return pa-pb;
    const da=a.due||"9999-12-31",db=b.due||"9999-12-31";
    return da.localeCompare(db);
  });
  const done=todos.filter(t=>t.done).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  let out="";
  if(active.length){
    out+=`<div class="todo-section-label">未完成（${active.length}）</div>`;
    out+=active.map(renderTodoCard).join("");
  }
  if(done.length){
    out+=`<details style="margin-top:14px"><summary>已完成（${done.length}）</summary><div>${done.map(renderTodoCard).join("")}</div></details>`;
  }
  todoList.innerHTML=out;
}
function tick(){
  updateDate();
  updateCountdown();
  if(editingEventId===null){
    renderEvents();
  }
}
renderNotes();
renderTodos();
tick();
setInterval(tick,1000);
</script>
</body>
</html>
